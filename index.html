<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulador GVA · Ayudante de Cocina</title>
  <style>
    :root{
      --bg:#0b1020; --panel:#121a33; --panel2:#0f1730; --text:#e7ecff;
      --muted:#aab4e6; --line:rgba(231,236,255,.12); --good:#2ecc71;
      --bad:#ff5a6a; --warn:#ffcc66; --btn:#2b3b7a; --btn2:#1b2550;
      --sel:rgba(122,162,255,.22); --selBorder:rgba(122,162,255,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui, sans-serif;
      background:radial-gradient(1200px 800px at 20% 0%,#192459 0%,var(--bg) 45%,#050713 100%);
      color:var(--text);
    }
    .wrap{max-width:1000px;margin:0 auto;padding:20px;}
    .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%); border:1px solid var(--line); border-radius:18px; box-shadow:0 10px 40px rgba(0,0,0,.35); overflow:hidden;}
    header{padding:18px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; justify-content:space-between;}
    h1{font-size:18px;margin:0}
    .pill{display:inline-flex;gap:12px;padding:10px 12px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.03); color:var(--muted); font-size:12px;}
    main{padding:18px;}
    .panel{border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,0.02); padding:20px; margin-bottom:20px;}
    button{border:0;cursor:pointer;border-radius:12px;padding:12px 20px; background:var(--btn); color:var(--text); font-weight:800; transition: 0.2s;}
    button:hover{filter: brightness(1.2);}
    button.secondary{background:var(--btn2); border:1px solid var(--line)}
    button.ghost{background:transparent; border:1px solid var(--line); color:var(--muted)}
    .opt{border:1px solid var(--line); border-radius:14px; padding:12px; margin-top:10px; background:rgba(255,255,255,0.02); cursor:pointer; display:flex; gap:10px;}
    .opt.selected{border-color:var(--selBorder); background:var(--sel)}
    .statusbar{display:flex; gap:5px; flex-wrap:wrap; padding:15px; border-top:1px solid var(--line); background:rgba(0,0,0,0.2);}
    .qbtn{width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; font-size:11px;}
    .qbtn.cur{border: 2px solid #fff; color:#fff}
    .qbtn.answered{background:var(--btn); color:#fff}
    
    /* Estilos de Revisión */
    .review-item { border-left: 4px solid var(--line); padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border-radius: 0 12px 12px 0; }
    .review-item.ok { border-color: var(--good); }
    .review-item.ko { border-color: var(--bad); }
    .review-item.null { border-color: var(--warn); }
    .exp { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 0.9em; color: var(--muted); }
    .coach-box { padding: 15px; border-radius: 12px; background: var(--sel); border: 1px solid var(--selBorder); margin-bottom: 20px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <header>
      <div>
        <h1 id="appTitle">Simulador GVA · Ayudante de Cocina</h1>
      </div>
      <div class="pill">
        <span>Tiempo: <strong id="pillTime">--:--</strong></span>
        <span>Progreso: <strong id="pillProg">0/0</strong></span>
      </div>
    </header>

    <main>
      <section id="home">
        <div class="panel">
          <h3 style="margin-top:0">Configuración del Test</h3>
          <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:8px; font-size:12px; color:var(--muted);">1. CARGAR ARCHIVO JSON</label>
            <input type="file" id="fileInput" accept=".json" style="font-size:14px;" />
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <div>
              <label style="display:block; font-size:12px; color:var(--muted);">MODO</label>
              <select id="modeSel" style="width:100%; padding:10px; border-radius:8px; background:#1b2550; color:#fff; border:1px solid var(--line);">
                <option value="exam">Examen Oficial (Aleatorio)</option>
                <option value="practice">Entrenamiento (Todas las preguntas)</option>
              </select>
            </div>
            <div>
              <label style="display:block; font-size:12px; color:var(--muted);">TIEMPO</label>
              <select id="timeSel" style="width:100%; padding:10px; border-radius:8px; background:#1b2550; color:#fff; border:1px solid var(--line);">
                <option value="115">115 minutos</option>
                <option value="60">60 minutos</option>
                <option value="20">20 minutos</option>
              </select>
            </div>
          </div>
          <button onclick="handleStart()" style="width:100%">EMPEZAR SIMULACIÓN</button>
        </div>
      </section>

      <section id="quiz" style="display:none;">
        <div class="panel">
          <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; color:var(--muted);">
            <span id="qIndex"></span>
            <button class="ghost" style="padding:5px 10px;" onclick="finish()">ENTREGAR EXAMEN</button>
          </div>
          <p id="qText" style="font-size:1.1rem; font-weight:500; min-height:60px;"></p>
          <div id="opts"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:25px;">
            <button class="secondary" onclick="prevQ()">ANTERIOR</button>
            <button onclick="nextQ()">SIGUIENTE</button>
          </div>
        </div>
      </section>

      <section id="result" style="display:none;">
        <div id="coachAnalysis" class="coach-box"></div>
        
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px; margin-bottom:30px;">
          <div class="panel" style="text-align:center; margin:0;"><small>Nota Final</small><div id="resScore" style="font-size:24px; font-weight:900;"></div></div>
          <div class="panel" style="text-align:center; margin:0;"><small>Aciertos</small><div id="resOk" style="color:var(--good); font-size:20px;"></div></div>
          <div class="panel" style="text-align:center; margin:0;"><small>Fallos</small><div id="resKo" style="color:var(--bad); font-size:20px;"></div></div>
          <div class="panel" style="text-align:center; margin:0;"><small>Blancas</small><div id="resNull" style="color:var(--warn); font-size:20px;"></div></div>
        </div>

        <h3 style="border-bottom:1px solid var(--line); padding-bottom:10px;">Revisión de Fallos</h3>
        <div id="reviewList"></div>
        
        <button onclick="location.reload()" style="width:100%; margin-top:20px;">VOLVER AL INICIO</button>
      </section>
    </main>

    <div id="statusbar" class="statusbar" style="display:none;"></div>
  </div>
</div>

<script>
let EXAM = null;
let QUESTIONS = [];
let state = {};
let current = 0;
let timer = null;
let timeLeft = 0;

function handleStart() {
  const fileSelector = document.getElementById('fileInput');
  if (fileSelector.files.length === 0) return alert("Selecciona el JSON del examen.");
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      EXAM = JSON.parse(e.target.result);
      setupTest();
    } catch { alert("Error en el formato del JSON."); }
  };
  reader.readAsText(fileSelector.files[0]);
}

function setupTest() {
  const mode = document.getElementById('modeSel').value;
  if(mode === 'practice') {
    QUESTIONS = [...EXAM.questions].sort(() => Math.random() - 0.5);
  } else {
    QUESTIONS = [];
    EXAM.config.blocks.forEach(b => {
      const filtered = EXAM.questions.filter(q => q.block === b.id).sort(() => Math.random() - 0.5);
      QUESTIONS.push(...filtered.slice(0, b.numQuestions));
    });
  }

  QUESTIONS.forEach((_, i) => state[i] = { answer: null });
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('statusbar').style.display = 'flex';
  
  timeLeft = parseInt(document.getElementById('timeSel').value) * 60;
  timer = setInterval(tick, 1000);
  renderQuestion();
}

function tick() {
  timeLeft--;
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  document.getElementById('pillTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if(timeLeft <= 0) finish();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('qIndex').textContent = `PREGUNTA ${current + 1} DE ${QUESTIONS.length}`;
  document.getElementById('qText').textContent = q.question;
  
  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'opt' + (state[current].answer === idx ? ' selected' : '');
    div.innerHTML = `<span style="opacity:0.5; font-weight:bold;">${String.fromCharCode(65+idx)}</span> <span>${opt}</span>`;
    div.onclick = () => { state[current].answer = idx; renderQuestion(); updateStatus(); };
    container.appendChild(div);
  });
  updateStatus();
}

function updateStatus() {
  const bar = document.getElementById('statusbar');
  bar.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'qbtn' + (i === current ? ' cur' : '') + (state[i].answer !== null ? ' answered' : '');
    b.textContent = i + 1;
    b.onclick = () => { current = i; renderQuestion(); };
    bar.appendChild(b);
  });
  document.getElementById('pillProg').textContent = `${Object.values(state).filter(s=>s.answer!==null).length}/${QUESTIONS.length}`;
}

function nextQ() { if(current < QUESTIONS.length-1) { current++; renderQuestion(); } }
function prevQ() { if(current > 0) { current--; renderQuestion(); } }

function finish() {
  clearInterval(timer);
  let ok = 0, ko = 0, bl = 0;
  const list = document.getElementById('reviewList');
  list.innerHTML = '';

  QUESTIONS.forEach((q, i) => {
    const ans = state[i].answer;
    let statusClass = 'null';
    if(ans === null) bl++;
    else if(ans === q.correct) { ok++; statusClass = 'ok'; }
    else { ko++; statusClass = 'ko'; }

    // Crear elemento de revisión
    const item = document.createElement('div');
    item.className = `review-item ${statusClass}`;
    item.innerHTML = `
      <div style="font-weight:bold; margin-bottom:5px;">${i+1}. ${q.question}</div>
      <div style="font-size:13px;">
        Tu respuesta: <span style="color:${ans===q.correct?'var(--good)':'var(--bad)'}">${ans!==null ? q.options[ans] : 'En blanco'}</span><br>
        Correcta: <span style="color:var(--good)">${q.options[q.correct]}</span>
      </div>
      ${q.explanation ? `<div class="exp"><strong>💡 Explicación:</strong> ${q.explanation}</div>` : ''}
    `;
    list.appendChild(item);
  });

  const finalScore = ok - (ko * 0.25);
  const percent = (finalScore / QUESTIONS.length) * 100;

  // Análisis del preparador
  let analysis = "";
  if(percent >= 80) analysis = "<strong>🏆 ¡Nivel Plaza!</strong> Estás en un estado de forma excelente. Sigue repasando los fallos puntuales para asegurar el 10 en el oficial.";
  else if(percent >= 50) analysis = "<strong>⚖️ Bien, pero falta pulir.</strong> Has aprobado, pero en una oposición real dependes de la nota de corte. Necesitas asegurar más temas específicos.";
  else analysis = "<strong>⚠️ Toca hincar los codos.</strong> Los conceptos generales están flojos. Te recomiendo repasar las explicaciones de abajo y volver a intentarlo en modo entrenamiento.";

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('statusbar').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  
  document.getElementById('resScore').textContent = finalScore.toFixed(2);
  document.getElementById('resOk').textContent = ok;
  document.getElementById('resKo').textContent = ko;
  document.getElementById('resNull').textContent = bl;
  document.getElementById('coachAnalysis').innerHTML = analysis;
}
</script>
</body>
</html>
